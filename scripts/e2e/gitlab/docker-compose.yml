services:
  gitlab:
    image: ${MIDDLEMAN_GITLAB_IMAGE:-gitlab/gitlab-ce:18.9.5-ce.0}
    shm_size: 256m
    ports:
      - "127.0.0.1:${GITLAB_HTTP_PORT:-18080}:80"
    environment:
      GITLAB_ROOT_PASSWORD: ${GITLAB_ROOT_PASSWORD:-V9q!T3m#R7p-L2x@N6s}
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost'
        gitlab_rails['initial_root_password'] = '${GITLAB_ROOT_PASSWORD:-V9q!T3m#R7p-L2x@N6s}'
        letsencrypt['enable'] = false
        prometheus_monitoring['enable'] = false
        puma['worker_processes'] = 0
        sidekiq['concurrency'] = 5
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab

volumes:
  gitlab-config:
  gitlab-logs:
  gitlab-data:
