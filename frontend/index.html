<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>middleman</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <style>
      /* Critical theme colors inlined to prevent flash before app.css loads */
      html { background: #f5f6f8; }
      html.dark { background: #0d0d12; color-scheme: dark; }
    </style>
    <script>
      // Apply theme before first paint to avoid flash of wrong theme.
      (function() {
        var cfg = window.__middleman_config;
        var mode = cfg && cfg.theme && cfg.theme.mode;
        var dark;
        if (mode === "dark") {
          dark = true;
        } else if (mode === "light") {
          dark = false;
        } else if (mode === "system") {
          dark = matchMedia("(prefers-color-scheme: dark)").matches;
        } else {
          try { var v = localStorage.getItem("middleman-theme"); } catch(e) { var v = null; }
          dark = v === "dark" || v === "light"
            ? v === "dark"
            : matchMedia("(prefers-color-scheme: dark)").matches;
        }
        if (dark) document.documentElement.classList.add("dark");
        // Apply color overrides from config before first paint
        var colors = cfg && cfg.theme && cfg.theme.colors;
        if (colors) {
          var map = {
            bgPrimary:"--bg-primary",bgSurface:"--bg-surface",
            bgSurfaceHover:"--bg-surface-hover",bgInset:"--bg-inset",
            textPrimary:"--text-primary",textSecondary:"--text-secondary",
            textMuted:"--text-muted"
          };
          var s = document.documentElement.style;
          for (var k in colors) { if (map[k]) s.setProperty(map[k], colors[k]); }
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
