<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <!-- Paper plane messenger: middleman as courier -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4E0EC"/>
      <stop offset="100%" stop-color="#6F8EA9"/>
    </linearGradient>
  </defs>
  <rect width="52" height="52" rx="8" fill="url(#sky)"/>
  <!-- faint motion trail -->
  <path d="M4 38 L16 34" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="1 3"/>
  <path d="M6 44 L20 40" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="1 3"/>
  <!-- plane body (top wing) -->
  <path d="M8 30 L46 8 L26 46 Z" fill="#FFFFFF"/>
  <!-- underside / fold -->
  <path d="M26 46 L24 28 L8 30 Z" fill="#BFCEDE"/>
  <!-- crisp crease highlight -->
  <path d="M8 30 L24 28 L46 8" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linejoin="round"/>
</svg>
