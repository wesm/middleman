<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <!-- CRT terminal prompt: green phosphor on black with scanlines -->
  <defs>
    <pattern id="scan" width="52" height="3" patternUnits="userSpaceOnUse">
      <rect width="52" height="1.2" fill="#0E1A14" opacity="0.55"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.9"/>
    </filter>
  </defs>
  <rect width="52" height="52" rx="8" fill="#070A09"/>
  <rect width="52" height="52" rx="8" fill="url(#scan)"/>
  <!-- chevron prompt (subtle glow copy behind) -->
  <g stroke="#6EFFA8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M13 16 L22 26 L13 36" opacity="0.45" filter="url(#glow)"/>
    <path d="M13 16 L22 26 L13 36"/>
  </g>
  <!-- cursor block -->
  <rect x="28" y="32" width="12" height="4" fill="#6EFFA8" opacity="0.45" filter="url(#glow)"/>
  <rect x="28" y="32" width="12" height="4" fill="#A8FFC9"/>
  <!-- subtle corner bracket -->
  <path d="M6 6 H11 M6 6 V11" stroke="#1D4A2E" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M46 46 H41 M46 46 V41" stroke="#1D4A2E" stroke-width="1.5" stroke-linecap="round"/>
</svg>
