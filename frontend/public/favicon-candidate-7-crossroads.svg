<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <!-- Heraldic crossroads: four inbound arrows converging on a center square -->
  <rect width="52" height="52" rx="8" fill="#0F3A2E"/>
  <!-- diamond frame -->
  <path d="M26 4 L48 26 L26 48 L4 26 Z" fill="none" stroke="#D4A747" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- 4 inbound arrows (gold) -->
  <g fill="#E8C35D">
    <!-- top arrow pointing down -->
    <path d="M26 6 L32 16 L28 16 L28 21 L24 21 L24 16 L20 16 Z"/>
    <!-- bottom arrow pointing up -->
    <path d="M26 46 L32 36 L28 36 L28 31 L24 31 L24 36 L20 36 Z"/>
    <!-- left arrow pointing right -->
    <path d="M6 26 L16 20 L16 24 L21 24 L21 28 L16 28 L16 32 Z"/>
    <!-- right arrow pointing left -->
    <path d="M46 26 L36 20 L36 24 L31 24 L31 28 L36 28 L36 32 Z"/>
  </g>
  <!-- central hub square -->
  <rect x="22.5" y="22.5" width="7" height="7" fill="#FFF3C2"/>
</svg>
