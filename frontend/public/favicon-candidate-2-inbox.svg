<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <!-- Review desk: a stack of PR cards sitting in an inbox tray -->
  <rect width="52" height="52" rx="8" fill="#F4ECD8"/>
  <!-- Back card -->
  <rect x="9" y="10" width="34" height="26" rx="3" fill="#FFFDF5" stroke="#A5946F" stroke-width="1.2"/>
  <circle cx="14" cy="15" r="1.8" fill="#6BAE74"/>
  <rect x="19" y="14" width="18" height="1.8" rx="0.9" fill="#C9BA93"/>
  <rect x="19" y="18" width="13" height="1.6" rx="0.8" fill="#D9CDAF"/>
  <!-- Middle card -->
  <rect x="7" y="15" width="34" height="26" rx="3" fill="#FFFDF5" stroke="#A5946F" stroke-width="1.2"/>
  <circle cx="12" cy="20" r="1.8" fill="#DEA03A"/>
  <rect x="17" y="19" width="18" height="1.8" rx="0.9" fill="#C9BA93"/>
  <rect x="17" y="23" width="11" height="1.6" rx="0.8" fill="#D9CDAF"/>
  <!-- Front card -->
  <rect x="5" y="20" width="34" height="26" rx="3" fill="#FFFDF5" stroke="#A5946F" stroke-width="1.2"/>
  <circle cx="10" cy="25" r="1.8" fill="#B44A3A"/>
  <rect x="15" y="24" width="18" height="1.8" rx="0.9" fill="#C9BA93"/>
  <rect x="15" y="28" width="15" height="1.6" rx="0.8" fill="#D9CDAF"/>
  <!-- Tray lip -->
  <path d="M3 42 H49 V46 Q49 48 47 48 H5 Q3 48 3 46 Z" fill="#A5703A"/>
  <rect x="3" y="42" width="46" height="1.4" fill="#7E5528"/>
</svg>
