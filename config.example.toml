sync_interval = "5m"
# Environment variable containing your GitHub personal access token.
# Required scopes: repo (private repos) or public_repo (public only).
github_token_env = "MIDDLEMAN_GITHUB_TOKEN"
# Host treated as implicit in repository UI labels
default_platform_host = "github.com"
host = "127.0.0.1"
port = 8091

[[platforms]]
type = "gitlab"
host = "gitlab.com"
token_env = "MIDDLEMAN_GITLAB_TOKEN"

[[repos]]
owner = "apache"
name = "arrow"

[[repos]]
owner = "ibis-project"
name = "ibis"

[[repos]]
platform = "gitlab"
platform_host = "gitlab.com"
# GitLab owner can include nested namespaces. repo_path is optional when it is
# exactly owner/name, but useful when preserving provider-canonical casing.
owner = "my-group/subgroup"
name = "my-project"
repo_path = "my-group/subgroup/my-project"
