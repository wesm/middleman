default_install_hook_types = ["pre-commit", "pre-push"]
default_stages = ["pre-commit"]

[[repos]]
repo = "builtin"
hooks = [
  { id = "check-case-conflict" },
  { id = "check-merge-conflict", args = ["--assume-in-merge"] },
  { id = "detect-private-key" },
  { id = "no-commit-to-branch" },
  { id = "check-added-large-files", args = ["--maxkb=1024"] },
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
  { id = "end-of-file-fixer" },
  { id = "check-json" },
  { id = "check-toml" },
  { id = "check-yaml" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "frontend-api-client-check",
    name = "prevent manual frontend /api/v1 calls",
    language = "system",
    entry = "make frontend-api-client-check",
    files = "^(scripts/lint-api-urls\\.(mjs|test\\.mjs)|frontend/src/.*\\.(svelte|ts|js|tsx|jsx)|packages/ui/src/.*\\.(svelte|ts|js|tsx|jsx))$",
    pass_filenames = false,
    require_serial = true,
    priority = 0,
  },
  {
    id = "font-size-token-check",
    name = "enforce font-size design tokens",
    language = "system",
    entry = "make font-size-token-check",
    files = "^(scripts/check-font-size-tokens\\.(ts|test\\.ts)|frontend/src/.*\\.(svelte|css|ts)|packages/ui/src/.*\\.(svelte|css|ts))$",
    pass_filenames = false,
    require_serial = true,
    priority = 0,
  },
  {
    id = "script-tests",
    name = "script regression tests",
    language = "system",
    entry = "make script-tests",
    files = "^scripts/.*\\.(mjs|ts|sh)$",
    pass_filenames = false,
    priority = 0,
  },
  {
    id = "huma-route-check",
    name = "prevent non-Huma Go routes",
    language = "system",
    entry = "make huma-route-check",
    files = "^(tools/nohttpmux/.*\\.go|cmd/.*\\.go|internal/.*\\.go|middleman\\.go)$",
    pass_filenames = false,
    priority = 0,
  },
  {
    id = "migration-history-check",
    name = "prevent edits to main-branch migrations",
    language = "system",
    entry = "go run ./tools/migrationhistorycheck",
    files = "^internal/db/migrations/.*$",
    pass_filenames = false,
    priority = 0,
  },
  {
    id = "api-generate",
    name = "regenerate api clients",
    language = "system",
    entry = "make api-generate",
    files = "^(go\\.mod|go\\.sum|cmd/middleman-openapi/.*\\.go|internal/server/.*\\.go|internal/db/.*\\.go|internal/apiclient/.*|frontend/package\\.json|frontend/bun\\.lock)$",
    pass_filenames = false,
    priority = 0,
  },
  {
    id = "gofmt",
    name = "gofmt",
    language = "system",
    entry = "gofmt -w",
    files = "\\.go$",
    priority = 0,
  },
  {
    id = "cargo-fmt",
    name = "cargo fmt",
    language = "system",
    entry = "cargo fmt --all",
    files = "^(Cargo\\.toml|Cargo\\.lock|rust/.*\\.rs|rust/.*/Cargo\\.toml)$",
    pass_filenames = false,
    priority = 0,
  },
  {
    id = "golangci-lint",
    name = "golangci-lint --fix",
    language = "system",
    entry = "make lint",
    files = "^(go\\.mod|go\\.sum|.*\\.go)$",
    pass_filenames = false,
    priority = 10,
  },
  {
    id = "testify-helper-check",
    name = "testify helper check",
    language = "system",
    entry = "make testify-helper-check",
    files = "^(go\\.mod|go\\.sum|.*\\.go)$",
    pass_filenames = false,
    priority = 15,
  },
  {
    id = "cargo-clippy",
    name = "cargo clippy",
    language = "system",
    entry = "cargo clippy --workspace --all-targets -- -D warnings",
    files = "^(Cargo\\.toml|Cargo\\.lock|rust/.*\\.(rs|toml)|rust/.*/Cargo\\.toml)$",
    pass_filenames = false,
    priority = 15,
  },
  {
    id = "go-test-short",
    name = "go test (short)",
    language = "system",
    entry = "make test-short",
    files = "^(go\\.mod|go\\.sum|.*\\.go)$",
    pass_filenames = false,
    priority = 20,
  },
  {
    id = "nilaway",
    name = "nilaway",
    language = "system",
    entry = "make nilaway",
    stages = ["pre-push"],
    types_or = ["go", "go-mod", "go-sum"],
    pass_filenames = false,
    priority = 25,
  },
  {
    id = "frontend-check",
    name = "typescript svelte lint",
    language = "system",
    entry = "make frontend-check",
    files = "^(package\\.json|bun\\.lock|frontend/((src|tests)/.*\\.(svelte|ts)|package\\.json|tsconfig\\.json|vite\\.config\\.ts|playwright(-e2e)?\\.config\\.ts|eslint\\.config\\.(js|mjs|cjs))|packages/ui/(src/.*\\.(svelte|ts)|package\\.json|tsconfig\\.json|eslint\\.config\\.(js|mjs|cjs)))$",
    pass_filenames = false,
    require_serial = true,
    priority = 5,
  },
]

[[repos]]
repo = "meta"
hooks = [
  { id = "check-hooks-apply" },
  { id = "check-useless-excludes" },
]
