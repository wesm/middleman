# Docker development config — port 18090 to avoid conflicting with host instance.
# Copy repos from ~/.config/middleman/config.toml or add via settings UI.

sync_interval = "5m"
github_token_env = "MIDDLEMAN_GITHUB_TOKEN"
host = "127.0.0.1"
port = 18090
data_dir = "/data"

[[repos]]
owner = "wesm"
name = "middleman"

[[repos]]
owner = "roborev-dev"
name = "roborev"

[activity]
view_mode = "threaded"
time_range = "7d"
