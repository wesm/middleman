version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - errcheck
    - forbidigo
    - govet
    - ineffassign
    - staticcheck
    - unused
    - modernize
    - testifylint
  settings:
    govet:
      disable:
        - shadow
        - fieldalignment
    errcheck:
      check-type-assertions: false
      check-blank: false
    forbidigo:
      forbid:
        - pattern: '^t\.(Fatal|Fatalf|Error|Errorf|Fail|FailNow)$'
          msg: Use testify assert/require helpers in tests.
        - pattern: '^testing\..+\.(Fatal|Fatalf|Error|Errorf|Fail|FailNow)$'
          msg: Use testify assert/require helpers in tests.
      analyze-types: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
