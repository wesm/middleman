name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod

      - name: Stub frontend embed dir
        run: |
          mkdir -p internal/web/dist
          echo ok > internal/web/dist/stub.html

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.10.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod

      - name: Stub frontend embed dir
        run: |
          mkdir -p internal/web/dist
          echo ok > internal/web/dist/stub.html

      - name: Run tests
        run: go test ./... -v -count=1

      - name: Run tests (race detector)
        run: go test -race ./... -count=1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.11"

      - name: Build frontend
        run: |
          cd frontend && bun install --frozen-lockfile && bun run build

      - name: Embed frontend
        run: |
          rm -rf internal/web/dist
          cp -r frontend/dist internal/web/dist

      - name: Build binary
        run: go build -o middleman ./cmd/middleman

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.11"

      - name: Build frontend
        run: cd frontend && bun install --frozen-lockfile && bun run build

      - name: Embed frontend
        run: |
          rm -rf internal/web/dist
          cp -r frontend/dist internal/web/dist

      - name: Build E2E server
        run: go build -o ./cmd/e2e-server/e2e-server ./cmd/e2e-server

      - name: Install Playwright browsers
        run: cd frontend && bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd frontend && bun run playwright test --config=playwright-e2e.config.ts
