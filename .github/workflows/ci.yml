name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  issues: read
  pull-requests: read
  statuses: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.11"

      - name: Stub frontend embed dir
        run: |
          mkdir -p internal/web/dist
          echo ok > internal/web/dist/stub.html

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend lint and typecheck
        run: cd frontend && bun run typecheck && bun run lint

      - name: Run packages/ui lint and typecheck
        run: cd packages/ui && bun run typecheck && bun run lint

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.10.1

      - name: Install NilAway
        run: |
          go install go.uber.org/nilaway/cmd/nilaway@v0.0.0-20260318203545-ad240b12fb4c
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run NilAway
        run: make nilaway

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.11"

      - name: Stub frontend embed dir
        run: |
          mkdir -p internal/web/dist
          echo ok > internal/web/dist/stub.html

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend unit tests
        run: cd frontend && bun run test

      - name: Run tests
        run: |
          mkdir -p tmp
          go tool gotestsum --format pkgname-and-test-fails --jsonfile=tmp/test-output.json -- ./... -shuffle=on

      - name: Publish unit test report
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451  # v2.7.0
        with:
          name: Go unit tests
          path: tmp/test-output.json
          reporter: golang-json
          fail-on-error: false

      - name: Run live GraphQL validation
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MIDDLEMAN_LIVE_GITHUB_TESTS: "1"
        run: |
          mkdir -p tmp
          go tool gotestsum --format pkgname-and-test-fails --jsonfile=tmp/test-graphql-output.json -- ./internal/github -run TestLiveGraphQLQueriesValidateAgainstGitHub -shuffle=on

      - name: Publish live GraphQL test report
        if: ${{ !cancelled() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451  # v2.7.0
        with:
          name: Go live GraphQL tests
          path: tmp/test-graphql-output.json
          reporter: golang-json
          fail-on-error: false

      - name: Run integration tests (git-dependent)
        run: |
          mkdir -p tmp
          go tool gotestsum --format pkgname-and-test-fails --jsonfile=tmp/test-integration-output.json -- -tags integration ./... -shuffle=on

      - name: Publish integration test report
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451  # v2.7.0
        with:
          name: Go integration tests
          path: tmp/test-integration-output.json
          reporter: golang-json
          fail-on-error: false

  race:
    name: go test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod

      - name: Stub frontend embed dir
        run: |
          mkdir -p internal/web/dist
          echo ok > internal/web/dist/stub.html

      - name: Run tests (race detector)
        run: |
          mkdir -p tmp
          go tool gotestsum --format pkgname-and-test-fails --jsonfile=tmp/test-race-output.json -- -race ./... -shuffle=on

      - name: Publish race test report
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451  # v2.7.0
        with:
          name: Go race tests
          path: tmp/test-race-output.json
          reporter: golang-json
          fail-on-error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.11"

      - name: Build frontend
        run: |
          cd frontend && bun install --frozen-lockfile && bun run build

      - name: Embed frontend
        run: |
          rm -rf internal/web/dist
          cp -r frontend/dist internal/web/dist

      - name: Build binary
        run: go build -o middleman ./cmd/middleman

  e2e:
    runs-on: ubuntu-latest
    # Browsers and their OS deps are preinstalled here, so apt-get is skipped
    # entirely. The image tag must track @playwright/test in bun.lock.
    container:
      image: mcr.microsoft.com/playwright:v1.55.1-noble
    # setup-go folds ImageOS into its cache key. Hosted runners set this to
    # ubuntu24; container jobs don't, so without this the e2e job misses the
    # host jobs' shared 178 MB Go cache. The Playwright image is also noble
    # on amd64, so the host's content-addressed build/module entries are
    # safe to reuse.
    #
    # GOCACHE / GOMODCACHE pin the build and module caches to the same
    # absolute paths the host jobs use. setup-go's cache tarball stores
    # absolute paths, so even with a matching key the restore lands at
    # /home/runner/... — which doesn't exist in the container. By
    # overriding go env to point at those paths (and mkdir'ing them in
    # the first step), the restored entries end up where Go looks for
    # them, dropping ~30 s off the e2e-server build per browser.
    env:
      ImageOS: ubuntu24
      GOCACHE: /home/runner/.cache/go-build
      GOMODCACHE: /home/runner/go/pkg/mod
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    name: e2e (${{ matrix.browser }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      # actions/checkout sets safe.directory in a temporary HOME, so the
      # config is gone by the time later steps run. go build's VCS stamping
      # shells out to git and fails ("error obtaining VCS status: exit
      # status 128") without this. Re-register against the persistent
      # /github/home for the rest of the job.
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # The Playwright image is minimal; install the few extras the e2e
      # server and setup-bun need:
      #   - unzip: setup-bun shells out to it to extract the bun tarball
      #   - tmux:  the e2e workspace runtime spawns tmux sessions
      - name: Install missing OS deps for the e2e job
        run: apt-get update && apt-get install -y --no-install-recommends unzip tmux

      # Pre-create the Go cache dirs at the host paths configured via
      # GOCACHE / GOMODCACHE so setup-go's restore (which extracts to
      # absolute paths from the host save) has somewhere to land.
      - name: Pre-create host-aligned Go cache dirs
        run: mkdir -p /home/runner/.cache/go-build /home/runner/go/pkg/mod

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.11"

      - name: Build frontend
        run: cd frontend && bun install --frozen-lockfile && bun run build

      - name: Embed frontend
        run: |
          rm -rf internal/web/dist
          cp -r frontend/dist internal/web/dist

      - name: Build E2E server
        run: go build -o ./cmd/e2e-server/e2e-server ./cmd/e2e-server

      # Firefox/WebKit refuse to launch when $HOME isn't owned by the running
      # user. Actions sets HOME=/github/home (owned by pwuser, the image's
      # default user) but starts the container as root, so Playwright bails
      # with "Firefox is unable to launch if the $HOME folder isn't owned by
      # the current user". Override HOME for the test run as Playwright's
      # docs recommend; the rest of the job keeps /github/home so setup-go's
      # cache paths still resolve.
      - name: Run E2E tests
        env:
          HOME: /root
        run: cd frontend && bun run playwright test --config=playwright-e2e.config.ts --project=${{ matrix.browser }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: e2e-report-${{ matrix.browser }}
          path: frontend/playwright-report/
          retention-days: 7

  e2e-roborev:
    runs-on: ubuntu-latest
    env:
      # Pin to post-v0.50.0 commit with OpenAPI/Huma support.
      # Update to next release tag when available.
      ROBOREV_REF: 34091063a7d9c415c35a0faba18d41952b331b0f
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: roborev-dev/roborev
          ref: ${{ env.ROBOREV_REF }}
          path: .roborev-src
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.11"

      - name: Run roborev E2E tests
        env:
          ROBOREV_SRC: ${{ github.workspace }}/.roborev-src
        run: ./scripts/run-roborev-e2e.sh

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: roborev-e2e-report
          path: frontend/playwright-report/
          retention-days: 7
