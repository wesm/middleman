services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "127.0.0.1:18090:18091"
    volumes:
      - .:/app
      - go-mod:/go/pkg/mod
      - go-cache:/go/cache
      - middleman-data:/data
      - ${HOME}/.config/middleman/config.toml:/data/config.toml:ro
    environment:
      MIDDLEMAN_GITHUB_TOKEN: ${MIDDLEMAN_GITHUB_TOKEN}
      MIDDLEMAN_HOME: /data
      GOCACHE: /go/cache
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:18091/healthz >/dev/null",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    command:
      - sh
      - -c
      - |
        socat -d0 TCP-LISTEN:18091,fork,bind=0.0.0.0,reuseaddr TCP:127.0.0.1:18090 &
        make dev

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "127.0.0.1:15173:15173"
    volumes:
      - .:/app
      - /app/frontend/node_modules
    environment:
      MIDDLEMAN_API_URL: http://backend:18091
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:15173/healthz >/dev/null",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    command:
      - sh
      - -c
      - make frontend-dev BUN_INSTALL_FLAGS=--frozen-lockfile ARGS="--host 0.0.0.0 --port 15173"

volumes:
  go-mod:
  go-cache:
  middleman-data:
