[tools]
bun = "latest"
"cargo:https://github.com/hughdbrown/samesame-rolling" = "rev:ff1f3b7942bd407ac3e30b21eb3dbe6085091a0f"
"github:F1bonacc1/process-compose" = "latest"
golangci-lint = "2.11.4"

[settings]
auto_install_disable_tools = ["cargo:https://github.com/hughdbrown/samesame-rolling"]

[tasks.dev-stack]
description = "Run backend and frontend dev servers with process-compose"
run = "process-compose -f process-compose.yml up"

[tasks.dev-compose]
description = "Run docker compose with host gh auth token injection"
run = 'MIDDLEMAN_GITHUB_TOKEN="$(gh auth token)" docker compose up'

[tasks.dev-compose-logs]
description = "Show docker compose logs"
run = 'docker compose logs -f'

[tasks.dev-compose-down]
description = "Stop docker compose stack"
run = 'docker compose down'
